<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conquest Westeros - Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #toolbar {
      padding: 10px 16px;
      background: #1a1a2e;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    #toolbar button {
      padding: 8px 16px;
      background: #334155;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    #toolbar button:hover {
      background: #475569;
    }
    #toolbar button.primary {
      background: #c9a227;
      color: #1a1a2e;
    }
    #toolbar button.primary:hover {
      background: #d4af37;
    }
    #toolbar label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    #toolbar input[type="number"] {
      width: 60px;
      padding: 6px 8px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #fff;
      font-size: 13px;
    }
    #preview-frame {
      flex: 1;
      border: none;
      background: #0f172a;
    }
    #status {
      padding: 6px 16px;
      background: #1a1a2e;
      border-top: 1px solid #334155;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button class="primary" onclick="refresh()">Refresh</button>
    <button onclick="openInNewTab()">Open in new tab</button>
    <label>
      <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()">
      Auto-refresh
    </label>
    <label>
      <input type="number" id="refreshInterval" value="2" min="1" max="10"> sec
    </label>
  </div>
  <iframe id="preview-frame" src="index.html" title="Game preview"></iframe>
  <div id="status">Preview: index.html • Last refresh: —</div>

  <script>
    const iframe = document.getElementById('preview-frame');
    let autoRefreshTimer = null;

    function refresh() {
      iframe.src = 'index.html?t=' + Date.now();
      document.getElementById('status').textContent = 'Preview: index.html • Last refresh: ' + new Date().toLocaleTimeString();
    }

    function openInNewTab() {
      window.open('index.html', '_blank');
    }

    function toggleAutoRefresh() {
      const enabled = document.getElementById('autoRefresh').checked;
      if (enabled) {
        const sec = parseInt(document.getElementById('refreshInterval').value) || 2;
        autoRefreshTimer = setInterval(refresh, sec * 1000);
      } else {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
      }
    }
  </script>
</body>
</html>
