<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Conquest of Westeros</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
  }
  #game-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  canvas {
    display: block;
    touch-action: none;
  }
  #send-buttons {
    display: flex;
    gap: 4px;
    padding: 4px 8px;
    background: rgba(26, 26, 46, 0.95);
    border-bottom: 1px solid #334155;
    flex-shrink: 0;
  }
  #send-buttons button {
    padding: 4px 10px;
    background: #334155;
    color: #c9a227;
    border: 1px solid #475569;
    border-radius: 4px;
    font-family: Georgia, serif;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
  }
  #send-buttons button:hover, #send-buttons button.active {
    background: #c9a227;
    color: #1a1a2e;
    border-color: #c9a227;
  }
  #debug-btn {
    position: fixed;
    top: 8px;
    right: 8px;
    padding: 6px 10px;
    background: #334155;
    color: #94a3b8;
    border: 1px solid #475569;
    border-radius: 4px;
    font-size: 10px;
    cursor: pointer;
    z-index: 100;
  }
  #debug-btn:hover { background: #475569; color: #fff; }
  #debug-panel {
    display: none;
    position: fixed;
    top: 40px;
    right: 8px;
    width: 200px;
    padding: 12px;
    background: rgba(15, 23, 42, 0.98);
    border: 1px solid #334155;
    border-radius: 8px;
    font-size: 11px;
    color: #cbd5e1;
    z-index: 100;
  }
  #debug-panel.open { display: block; }
  #debug-panel h3 { margin-bottom: 8px; font-size: 12px; color: #c9a227; }
  #debug-panel label { display: block; margin: 6px 0; }
  #debug-panel button { margin: 4px 2px 4px 0; padding: 4px 8px; font-size: 10px; cursor: pointer; }
</style>
</head>
<body>
<div id="game-wrap">
  <div id="send-buttons">
    <button data-ratio="0.25" class="active">25%</button>
    <button data-ratio="0.5">50%</button>
    <button data-ratio="1">100%</button>
  </div>
  <canvas id="gameCanvas"></canvas>
</div>
<button id="debug-btn">Debug</button>
<div id="debug-panel">
  <h3>Debug Menu</h3>
  <label><input type="checkbox" id="dbg-edit"> Edit castle positions</label>
  <label><input type="checkbox" id="dbg-ai" checked> AI enabled</label>
  <label>Speed: <input type="range" id="dbg-speed" min="0.5" max="3" step="0.25" value="1"></label>
  <label><input type="checkbox" id="dbg-overlay"> Show troop overlay</label>
  <div>
    <button id="dbg-reset">Reset game</button>
    <button id="dbg-clear-pos">Clear saved positions</button>
  </div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Responsive sizing - portrait mobile
function resize() {
  const maxW = Math.min(window.innerWidth, 430);
  const maxH = Math.min(window.innerHeight, 932);
  const aspect = 9 / 16;
  let w = maxW;
  let h = w / aspect;
  if (h > maxH) { h = maxH; w = h * aspect; }
  canvas.width = w;
  canvas.height = h;
}
resize();
window.addEventListener('resize', () => { resize(); });

const W = () => canvas.width;
const H = () => canvas.height;

// ─── HOUSES ───────────────────────────────────────────────
const HOUSES = {
  stark:      { name: 'Stark',      color: '#708090', light: '#a0b0c0', sigil: 'wolf',    textColor: '#fff' },
  lannister:  { name: 'Lannister',  color: '#c8a800', light: '#ffd700', sigil: 'lion',    textColor: '#1a1a1a' },
  targaryen:  { name: 'Targaryen',  color: '#8b0000', light: '#cc2200', sigil: 'dragon',  textColor: '#fff' },
  baratheon:  { name: 'Baratheon',  color: '#1a1a2e', light: '#f0c030', sigil: 'stag',    textColor: '#f0c030' },
  greyjoy:    { name: 'Greyjoy',    color: '#2c2c2c', light: '#778899', sigil: 'kraken',  textColor: '#aaa' },
  tully:      { name: 'Tully',      color: '#1a3a6b', light: '#4a7abf', sigil: 'fish',    textColor: '#fff' },
  martell:    { name: 'Martell',    color: '#c45c26', light: '#e88b5c', sigil: 'sun',     textColor: '#fff' },
  tyrell:     { name: 'Tyrell',     color: '#2d5a1b', light: '#5a9e32', sigil: 'rose',    textColor: '#fff' },
  arryn:      { name: 'Arryn',      color: '#4a6fa5', light: '#8bb4e0', sigil: 'falcon',  textColor: '#fff' },
};

// ─── CASTLES ──────────────────────────────────────────────
const CASTLE_DEFS = [
  { id: 'winterfell',  house: 'stark',     owner: 'player',  troops: 100, px: 0.50, py: 0.10, name: 'Winterfell' },
  { id: 'pyke',        house: 'greyjoy',   owner: 'neutral', troops: 50, px: 0.18, py: 0.32, name: 'Pyke' },
  { id: 'riverrun',    house: 'tully',     owner: 'neutral', troops: 50, px: 0.55, py: 0.35, name: 'Riverrun' },
  { id: 'casterly',    house: 'lannister', owner: 'neutral', troops: 50, px: 0.22, py: 0.55, name: 'Casterly Rock' },
  { id: 'dragonstone', house: 'targaryen', owner: 'neutral', troops: 50, px: 0.78, py: 0.45, name: 'Dragonstone' },
  { id: 'stormsend',   house: 'baratheon', owner: 'neutral', troops: 50, px: 0.62, py: 0.72, name: "Storm's End" },
  { id: 'sunspear',    house: 'martell',   owner: 'neutral', troops: 50, px: 0.38, py: 0.82, name: 'Sunspear' },
  { id: 'highgarden',  house: 'tyrell',    owner: 'neutral', troops: 50, px: 0.52, py: 0.78, name: 'Highgarden' },
  { id: 'eyrie',       house: 'arryn',     owner: 'neutral', troops: 50, px: 0.68, py: 0.28, name: "The Eyrie" },
];

const TROOP_GROWTH = 0.03;
let sendRatio = 0.5;
const CASTLE_RADIUS = 28;
const AI_SEND_RATIO = 0.5;
const AI_COOLDOWN_MIN = 80;
const AI_COOLDOWN_MAX = 160;
const AI_MIN_TROOPS = 8;
const AI_GRACE_MS = 2000;
const AI_PLAYER_SAFETY_MS = 30000;
const CASTLE_IMG_SIZE = 56;
const FLEET_SPEED = 2;

const CASTLE_ASSETS = ['stark', 'lannister', 'targaryen', 'baratheon', 'greyjoy', 'tully', 'martell', 'tyrell', 'arryn'];
let castleImages = {};
let castleImagesNoBg = {};
let mapImage = new Image();
mapImage.src = 'assets/map.png';

function removeBlackFromImage(img) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth;
  c.height = img.naturalHeight;
  const cctx = c.getContext('2d');
  cctx.drawImage(img, 0, 0);
  const d = cctx.getImageData(0, 0, c.width, c.height);
  const data = d.data;
  const threshold = 110;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i + 1], b = data[i + 2];
    if (r < threshold && g < threshold && b < threshold) {
      data[i + 3] = 0;
    }
  }
  cctx.putImageData(d, 0, 0);
  return c;
}

let castles = [];
let fleets = [];
let dragStartCastle = null;
let dragX = 0, dragY = 0;
let selectedCastles = [];
let pointerDownX = 0, pointerDownY = 0;
let gameOver = null;
let aiCooldowns = {};
let gameStartTime = 0;
let debugEditMode = false;
let debugAIEnabled = true;
let debugSpeed = 1;
let debugOverlay = false;
let debugSpeedAccum = 0;
let dragOffsetX = 0, dragOffsetY = 0;

const POSITIONS_KEY = 'conquest-westeros-castle-positions';

function initCastles() {
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(POSITIONS_KEY)); } catch (_) {}
  castles = CASTLE_DEFS.map((c, i) => {
    const pos = saved && saved[c.id];
    const px = pos ? pos.px : c.px;
    const py = pos ? pos.py : c.py;
    return {
      ...c,
      px, py,
      x: W() * px,
      y: H() * py,
      troops: c.troops,
      owner: c.owner === 'player' ? 'player' : c.house,
    };
  });
  fleets = [];
  dragStartCastle = null;
  selectedCastles = [];
  gameOver = null;
  gameStartTime = Date.now();
  console.log('Castle owners:', castles.map(c => `${c.name}: owner=${c.owner}, house=${c.house}`));
  castles.filter(c => c.owner !== 'player').forEach(c => {
    aiCooldowns[c.id] = 20 + Math.random() * 60;
  });
}

function getCastleAt(x, y) {
  const hitRadius = CASTLE_IMG_SIZE * 0.6;
  for (let i = castles.length - 1; i >= 0; i--) {
    const c = castles[i];
    if (Math.hypot(x - c.x, y - c.y) < hitRadius) return c;
  }
  return null;
}

function sendTroops(from, to) {
  const count = Math.floor(from.troops * sendRatio);
  if (count < 1 || from === to) return;
  from.troops -= count;
  fleets.push({ x: from.x, y: from.y, target: to, troops: count, owner: from.owner, house: from.house });
}

function runAI() {
  if (!debugAIEnabled) return;
  const elapsed = Date.now() - gameStartTime;
  if (elapsed < AI_GRACE_MS) return;
  const d = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
  castles.forEach(c => {
    if (c.owner === 'player') return;
    const cd = aiCooldowns[c.id] ?? 0;
    if (cd > 0) { aiCooldowns[c.id] = cd - 1; return; }
    if (c.troops < AI_MIN_TROOPS) return;

    const others = castles.filter(t => t !== c && t.owner !== c.owner);
    if (others.length === 0) return;
    let targets = others.filter(t => t.owner !== 'player');
    if (targets.length === 0 || elapsed >= AI_PLAYER_SAFETY_MS) targets = others;
    const nearest = targets.reduce((a, b) => (d(c, a) < d(c, b) ? a : b));
    const count = Math.floor(c.troops * AI_SEND_RATIO);
    if (count >= 1 && nearest) {
      console.log(`${c.name}(${c.owner}) → ${nearest.name}(${nearest.owner}) [${count} troops]`);
      c.troops -= count;
      fleets.push({ x: c.x, y: c.y, target: nearest, troops: count, owner: c.owner, house: c.house });
      aiCooldowns[c.id] = AI_COOLDOWN_MIN + Math.random() * (AI_COOLDOWN_MAX - AI_COOLDOWN_MIN);
    }
  });
}

function update() {
  if (gameOver) return;
  if (debugEditMode) return;

  castles.forEach(c => {
    c.troops += TROOP_GROWTH;
  });

  runAI();

  fleets.forEach(f => {
    const dx = f.target.x - f.x;
    const dy = f.target.y - f.y;
    const dist = Math.hypot(dx, dy);
    if (dist < FLEET_SPEED) {
      if (f.target.owner === f.owner) {
        f.target.troops += f.troops;
      } else {
        f.target.troops -= f.troops;
        if (f.target.troops < 0) {
          f.target.owner = f.owner;
          f.target.house = f.house;
          f.target.troops = Math.abs(f.target.troops);
        }
      }
      f.arrived = true;
    } else {
      f.x += (dx / dist) * FLEET_SPEED;
      f.y += (dy / dist) * FLEET_SPEED;
    }
  });
  fleets = fleets.filter(f => !f.arrived);

  const playerCastles = castles.filter(c => c.owner === 'player');
  const enemyCastles = castles.filter(c => c.owner !== 'player');
  const playerFleets = fleets.filter(f => f.owner === 'player');
  if (playerCastles.length === 0 && playerFleets.length === 0) gameOver = 'defeat';
  if (enemyCastles.length === 0) gameOver = 'victory';
}

function draw() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W(), H());

  if (mapImage.complete && mapImage.naturalWidth) {
    ctx.drawImage(mapImage, 0, 0, W(), H());
  } else {
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.moveTo(W() * 0.10, H() * 0.04);
    ctx.lineTo(W() * 0.90, H() * 0.06);
    ctx.lineTo(W() * 0.96, H() * 0.50);
    ctx.lineTo(W() * 0.72, H() * 0.96);
    ctx.lineTo(W() * 0.24, H() * 0.94);
    ctx.lineTo(W() * 0.04, H() * 0.46);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  if (dragStartCastle) {
    ctx.strokeStyle = 'rgba(201, 162, 39, 0.6)';
    ctx.lineWidth = 3;
    ctx.setLineDash([6, 4]);
    const sources = selectedCastles.length ? selectedCastles : [dragStartCastle];
    sources.forEach(c => {
      ctx.beginPath();
      ctx.moveTo(c.x, c.y);
      ctx.lineTo(dragX, dragY);
      ctx.stroke();
    });
    ctx.setLineDash([]);
  }

  fleets.forEach(f => {
    const h = HOUSES[f.house] || HOUSES.stark;
    ctx.fillStyle = h.color;
    ctx.beginPath();
    ctx.arc(f.x, f.y, 8, 0, Math.PI * 2);
    ctx.fill();
  });

  castles.forEach(c => {
    const h = HOUSES[c.house];
    const isSelected = selectedCastles.includes(c) || dragStartCastle === c;
    const img = castleImages[c.house];
    const half = CASTLE_IMG_SIZE / 2;

    const processed = castleImagesNoBg[c.house];
    if (processed) {
      ctx.drawImage(processed, 0, 0, processed.width, processed.height, c.x - half, c.y - half, CASTLE_IMG_SIZE, CASTLE_IMG_SIZE);
    } else if (img && img.complete && img.naturalWidth) {
      ctx.drawImage(img, c.x - half, c.y - half, CASTLE_IMG_SIZE, CASTLE_IMG_SIZE);
    } else {
      ctx.fillStyle = h.color;
      ctx.beginPath();
      ctx.arc(c.x, c.y, half, 0, Math.PI * 2);
      ctx.fill();
    }

    if (isSelected) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(c.x, c.y, half + 2, 0, Math.PI * 2);
      ctx.stroke();
    }

    const troopStr = String(Math.floor(c.troops));
    ctx.font = 'bold 15px Georgia';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.lineJoin = 'round';
    ctx.miterLimit = 2;
    ctx.strokeText(troopStr, c.x, c.y);
    ctx.fillStyle = '#fff';
    ctx.fillText(troopStr, c.x, c.y);
  });

  const sendBtns = document.getElementById('send-buttons');
  if (sendBtns) sendBtns.style.display = (gameOver || debugEditMode) ? 'none' : 'flex';

  if (debugOverlay) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, 140, 22 + castles.length * 14);
    ctx.fillStyle = '#c9a227';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('Castle | Troops | Owner', 6, 14);
    castles.forEach((c, i) => {
      ctx.fillStyle = c.owner === 'player' ? '#22c55e' : '#94a3b8';
      ctx.fillText(`${c.name || c.id} | ${Math.floor(c.troops)} | ${c.owner}`, 6, 28 + i * 14);
    });
    ctx.textAlign = 'center';
  }

  if (gameOver === 'victory') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, W(), H());
    ctx.fillStyle = '#c9a227';
    ctx.font = 'bold 28px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Conquest Complete!', W() / 2, H() / 2 - 40);
    ctx.fillStyle = '#c0c0c0';
    ctx.font = '16px Georgia';
    ctx.fillText('You have conquered Westeros.', W() / 2, H() / 2 - 10);
    ctx.fillStyle = '#c9a227';
    ctx.font = 'bold 16px Georgia';
    ctx.fillText('Tap to claim the Iron Throne', W() / 2, H() / 2 + 30);
  } else if (gameOver === 'defeat') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, W(), H());
    ctx.fillStyle = '#c0392b';
    ctx.font = 'bold 28px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Defeat', W() / 2, H() / 2 - 40);
    ctx.fillStyle = '#c0c0c0';
    ctx.font = '16px Georgia';
    ctx.fillText('Your castle has fallen.', W() / 2, H() / 2 - 10);
    ctx.fillStyle = '#c9a227';
    ctx.font = 'bold 16px Georgia';
    ctx.fillText('Tap to try again', W() / 2, H() / 2 + 30);
  }
}

function gameLoop() {
  castles.forEach(c => {
    c.x = W() * (c.px ?? c.x / W());
    c.y = H() * (c.py ?? c.y / H());
  });
  debugSpeedAccum += debugSpeed;
  while (debugSpeedAccum >= 1) { update(); debugSpeedAccum -= 1; }
  draw();
  requestAnimationFrame(gameLoop);
}

function toCanvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY,
  };
}

function handlePointerDown(clientX, clientY) {
  if (gameOver === 'defeat') {
    initCastles();
    return;
  }
  if (gameOver === 'victory') {
    alert('Download Game of Thrones: Conquest');
    return;
  }
  if (gameOver) return;

  const { x, y } = toCanvasCoords(clientX, clientY);
  pointerDownX = x;
  pointerDownY = y;
  const castle = getCastleAt(x, y);

  if (debugEditMode && castle) {
    dragStartCastle = castle;
    dragOffsetX = x - castle.x;
    dragOffsetY = y - castle.y;
    dragX = x;
    dragY = y;
    return;
  }

  if (castle && castle.owner === 'player') {
    dragStartCastle = castle;
    dragX = x;
    dragY = y;
  }
}

function handlePointerMove(clientX, clientY) {
  if (!dragStartCastle) return;
  const { x, y } = toCanvasCoords(clientX, clientY);
  dragX = x;
  dragY = y;
  if (debugEditMode) {
    const c = dragStartCastle;
    c.x = x - dragOffsetX;
    c.y = y - dragOffsetY;
    c.px = c.x / W();
    c.py = c.y / H();
  }
}

function handlePointerUp(clientX, clientY) {
  if (!dragStartCastle) return;

  if (debugEditMode) {
    const c = dragStartCastle;
    c.px = c.x / W();
    c.py = c.y / H();
    const positions = {};
    castles.forEach(cs => { positions[cs.id] = { px: cs.px, py: cs.py }; });
    localStorage.setItem(POSITIONS_KEY, JSON.stringify(positions));
    dragStartCastle = null;
    return;
  }

  const { x, y } = toCanvasCoords(clientX, clientY);
  const moved = Math.hypot(x - pointerDownX, y - pointerDownY) > 15;
  const castle = getCastleAt(x, y);

  if (moved && castle) {
    const sources = selectedCastles.length ? selectedCastles : (dragStartCastle ? [dragStartCastle] : []);
    sources.forEach(from => {
      if (from !== castle) sendTroops(from, castle);
    });
    if (sources.length) selectedCastles = [];
  } else if (!moved && dragStartCastle && dragStartCastle.owner === 'player') {
    const i = selectedCastles.indexOf(dragStartCastle);
    if (i >= 0) selectedCastles.splice(i, 1);
    else selectedCastles.push(dragStartCastle);
  }

  dragStartCastle = null;
}

canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  handlePointerDown(e.clientX, e.clientY);
  if (dragStartCastle) e.target.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', (e) => {
  handlePointerMove(e.clientX, e.clientY);
});
canvas.addEventListener('pointerup', (e) => {
  e.preventDefault();
  handlePointerUp(e.clientX, e.clientY);
});
canvas.addEventListener('pointercancel', () => {
  dragStartCastle = null;
});

document.querySelectorAll('#send-buttons button').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.ratio == null) return;
    sendRatio = parseFloat(btn.dataset.ratio);
    document.querySelectorAll('#send-buttons button[data-ratio]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.getElementById('debug-btn').addEventListener('click', () => {
  document.getElementById('debug-panel').classList.toggle('open');
});
document.getElementById('dbg-edit').addEventListener('change', (e) => {
  debugEditMode = e.target.checked;
  if (!debugEditMode) dragStartCastle = null;
});
document.getElementById('dbg-ai').addEventListener('change', (e) => { debugAIEnabled = e.target.checked; });
document.getElementById('dbg-speed').addEventListener('input', (e) => { debugSpeed = parseFloat(e.target.value); });
document.getElementById('dbg-overlay').addEventListener('change', (e) => { debugOverlay = e.target.checked; });
document.getElementById('dbg-reset').addEventListener('click', () => {
  initCastles();
  document.getElementById('debug-panel').classList.remove('open');
});
document.getElementById('dbg-clear-pos').addEventListener('click', () => {
  localStorage.removeItem(POSITIONS_KEY);
  initCastles();
  document.getElementById('debug-panel').classList.remove('open');
});

function loadCastleImages() {
  CASTLE_ASSETS.forEach(house => {
    const img = new Image();
    img.onload = () => {
      castleImagesNoBg[house] = removeBlackFromImage(img);
    };
    img.src = `assets/${house}.png`;
    castleImages[house] = img;
  });
}

loadCastleImages();
initCastles();
gameLoop();
</script>
</body>
</html>
