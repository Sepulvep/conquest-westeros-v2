<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Conquest of Westeros</title>
<style>
  @font-face {
    font-family: 'BentonSans';
    src: url('assets/BentonSans-Cond.otf') format('opentype');
    font-weight: normal;
  }
  @font-face {
    font-family: 'BentonSans';
    src: url('assets/BentonSans-CondBold.otf') format('opentype');
    font-weight: bold;
  }
  @font-face {
    font-family: 'GoudyTrajan';
    src: url('assets/GoudyTrajan-Bold.otf') format('opentype');
    font-weight: bold;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'BentonSans', sans-serif;
  }
  #game-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  canvas {
    display: block;
    touch-action: none;
  }
  #debug-btn {
    position: fixed;
    top: 8px;
    right: 8px;
    padding: 6px 10px;
    background: #334155;
    color: #94a3b8;
    border: 1px solid #475569;
    border-radius: 4px;
    font-size: 10px;
    cursor: pointer;
    z-index: 100;
  }
  #debug-btn:hover { background: #475569; color: #fff; }
  #debug-panel {
    display: none;
    position: fixed;
    top: 40px;
    right: 8px;
    width: 200px;
    padding: 12px;
    background: rgba(15, 23, 42, 0.98);
    border: 1px solid #334155;
    border-radius: 8px;
    font-size: 11px;
    color: #cbd5e1;
    z-index: 100;
  }
  #debug-panel.open { display: block; }
  #debug-panel h3 { margin-bottom: 8px; font-size: 12px; color: #c9a227; }
  #debug-panel label { display: block; margin: 6px 0; }
  #debug-panel button { margin: 4px 2px 4px 0; padding: 8px 12px; font-size: 12px; cursor: pointer; border-radius: 4px; border: 1px solid #475569; background: #334155; color: #e2e8f0; }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="gameCanvas"></canvas>
</div>
<button id="debug-btn" style="display:none">Debug</button>
<div id="debug-panel">
  <h3>Debug Menu</h3>
  <label><input type="checkbox" id="dbg-edit"> Edit castle positions</label>
  <label><input type="checkbox" id="dbg-ai" checked> AI enabled</label>
  <label>Speed: <input type="range" id="dbg-speed" min="0.5" max="3" step="0.25" value="1"></label>
  <label><input type="checkbox" id="dbg-overlay"> Show troop overlay</label>
  <div>
    <button id="dbg-reset">Reset game</button>
    <button id="dbg-clear-pos">Clear saved positions</button>
    <button id="dbg-export">Export positions</button>
  </div>
  <pre id="dbg-export-output" style="display:none; font-size:9px; max-height:200px; overflow:auto; background:#0f172a; padding:6px; border-radius:4px; margin-top:6px; word-break:break-all; user-select:all;"></pre>
</div>
<script>
const DEBUG = false;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Responsive sizing - portrait mobile
function resize() {
  const maxW = Math.min(window.innerWidth, 430);
  const maxH = Math.min(window.innerHeight, 932);
  const aspect = 9 / 16;
  let w = maxW;
  let h = w / aspect;
  if (h > maxH) { h = maxH; w = h * aspect; }
  canvas.width = w;
  canvas.height = h;
}
resize();
window.addEventListener('resize', () => { resize(); });

const W = () => canvas.width;
const H = () => canvas.height;

// ─── HOUSES ───────────────────────────────────────────────
const HOUSES = {
  stark:      { name: 'Stark',      color: '#ffffff', light: '#e0e0e0', sigil: 'wolf',    textColor: '#000' },
  lannister:  { name: 'Lannister',  color: '#dc2626', light: '#f87171', sigil: 'lion',    textColor: '#fff' },
  targaryen:  { name: 'Targaryen',  color: '#1a1a1a', light: '#444444', sigil: 'dragon',  textColor: '#fff' },
  baratheon:  { name: 'Baratheon',  color: '#d4a017', light: '#f0c030', sigil: 'stag',    textColor: '#fff' },
  greyjoy:    { name: 'Greyjoy',    color: '#6b7280', light: '#9ca3af', sigil: 'kraken',  textColor: '#fff' },
  tully:      { name: 'Tully',      color: '#2563eb', light: '#60a5fa', sigil: 'fish',    textColor: '#fff' },
  martell:    { name: 'Martell',    color: '#ea580c', light: '#fb923c', sigil: 'sun',     textColor: '#fff' },
  tyrell:     { name: 'Tyrell',     color: '#16a34a', light: '#4ade80', sigil: 'rose',    textColor: '#fff' },
  arryn:      { name: 'Arryn',      color: '#7dd3fc', light: '#bae6fd', sigil: 'falcon',  textColor: '#1a1a1a' },
};

// ─── CASTLES ──────────────────────────────────────────────
const CASTLE_DEFS = [
  { id: 'winterfell',  house: 'stark',     owner: 'neutral', troops: 50,  px: 0.5402, py: 0.2698, name: 'Winterfell' },
  { id: 'pyke',        house: 'greyjoy',   owner: 'neutral', troops: 50,  px: 0.1501, py: 0.4020, name: 'Pyke' },
  { id: 'riverrun',    house: 'tully',     owner: 'neutral', troops: 50,  px: 0.4474, py: 0.5697, name: 'Riverrun' },
  { id: 'casterly',    house: 'lannister', owner: 'neutral', troops: 50,  px: 0.1832, py: 0.6469, name: 'Casterly Rock' },
  { id: 'dragonstone', house: 'targaryen', owner: 'player',  troops: 100, px: 0.6313, py: 0.7579, name: "King's Landing" },
  { id: 'stormsend',   house: 'baratheon', owner: 'neutral', troops: 50,  px: 0.9072, py: 0.6979, name: "Storm's End" },
  { id: 'sunspear',    house: 'martell',   owner: 'neutral', troops: 50,  px: 0.7364, py: 0.9265, name: 'Sunspear' },
  { id: 'highgarden',  house: 'tyrell',    owner: 'neutral', troops: 50,  px: 0.2790, py: 0.8606, name: 'Highgarden' },
  { id: 'eyrie',       house: 'arryn',     owner: 'neutral', troops: 50,  px: 0.7561, py: 0.5702, name: "The Eyrie" },
];

const TROOP_GROWTH = 0.03;
let sendRatio = 0.25;
const CASTLE_RADIUS = 28;
const AI_SEND_RATIO = 0.5;
const AI_COOLDOWN_MIN = 80;
const AI_COOLDOWN_MAX = 160;
const AI_MIN_TROOPS = 20;
const AI_GARRISON = 15;
const AI_GRACE_MS = 8500;
const AI_PLAYER_SAFETY_MS = 20000;
const CASTLE_IMG_SIZE = 68;
const FLEET_SPEED = 1.28;

const CASTLE_ASSETS = ['stark', 'lannister', 'targaryen', 'baratheon', 'greyjoy', 'tully', 'martell', 'tyrell', 'arryn'];
let castleImages = {};
let castleImagesNoBg = {};
function removeEdgeBgFromImage(img, isDark) {
  const c = document.createElement('canvas');
  const w = img.naturalWidth;
  const h = img.naturalHeight;
  c.width = w;
  c.height = h;
  const cctx = c.getContext('2d');
  cctx.drawImage(img, 0, 0);
  const d = cctx.getImageData(0, 0, w, h);
  const data = d.data;
  const visited = new Uint8Array(w * h);
  const isBg = isDark
    ? (idx) => data[idx] < 50 && data[idx + 1] < 50 && data[idx + 2] < 50
    : (idx) => data[idx] > 200 && data[idx + 1] > 200 && data[idx + 2] > 200;
  const stack = [];
  for (let x = 0; x < w; x++) { stack.push(x); stack.push(x + (h - 1) * w); }
  for (let y = 0; y < h; y++) { stack.push(y * w); stack.push((w - 1) + y * w); }
  while (stack.length) {
    const pos = stack.pop();
    if (pos < 0 || pos >= w * h || visited[pos]) continue;
    const idx = pos * 4;
    if (!isBg(idx)) continue;
    visited[pos] = 1;
    data[idx + 3] = 0;
    const x = pos % w, y = (pos - x) / w;
    if (x > 0) stack.push(pos - 1);
    if (x < w - 1) stack.push(pos + 1);
    if (y > 0) stack.push(pos - w);
    if (y < h - 1) stack.push(pos + w);
  }
  cctx.putImageData(d, 0, 0);
  return c;
}

function removeBlackFromImage(img) { return removeEdgeBgFromImage(img, true); }

let mapImage = new Image();
let knightImage = new Image();
let knightImageNoBg = null;
knightImage.onload = () => { try { knightImageNoBg = removeEdgeBgFromImage(knightImage, false); } catch (_) { knightImageNoBg = null; } };
let selectionMarkerImage = new Image();
let targetMarkerImage = new Image();
let splashImage = new Image();
let marchLineImage = new Image();
let titleFireImage = new Image();
let titleLogoImage = new Image();
let pointerImage = new Image();

let castles = [];
let fleets = [];
let dragStartCastle = null;
let dragX = 0, dragY = 0;
let selectedCastles = [];
let pointerDownX = 0, pointerDownY = 0;
let gameOver = null;
const bgMusic = new Audio('assets/music.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.4;
let musicStarted = false;
const sfxVictory = new Audio('assets/sfx_victory.wav');
sfxVictory.volume = 1.0;
function tryStartMusic() {
  if (musicStarted) return;
  musicStarted = true;
  bgMusic.play().catch(() => {});
}
let aiCooldowns = {};
let gameStartTime = 0;
let debugEditMode = false;
let debugAIEnabled = true;
let debugSpeed = 1;
let debugOverlay = false;
let debugSpeedAccum = 0;
let dragOffsetX = 0, dragOffsetY = 0;
let impactParticles = [];
const RATIO_OPTIONS = [
  { ratio: 0.25, label: '25%' },
  { ratio: 0.5,  label: '50%' },
  { ratio: 1,    label: '100%' },
];
const RATIO_BTN_W = 50, RATIO_BTN_H = 32, RATIO_BTN_GAP = 6, RATIO_BTN_X = 8, RATIO_BTN_Y = 52, RATIO_LABEL_Y = 42;
const INSTRUCTION_FADE_MS = 8000;
const CTA_BTN_W = 90, CTA_BTN_H = 30, CTA_BTN_MARGIN = 8;
let lastTapTime = 0;
let lastTapCastle = null;
let selectAllMode = false;

const POSITIONS_KEY = 'conquest-westeros-castle-positions';

function initCastles() {
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(POSITIONS_KEY)); } catch (_) {}
  castles = CASTLE_DEFS.map((c, i) => {
    const pos = saved && saved[c.id];
    const px = pos ? pos.px : c.px;
    const py = pos ? pos.py : c.py;
    return {
      ...c,
      px, py,
      x: W() * px,
      y: H() * py,
      troops: c.troops,
      owner: c.owner === 'player' ? 'player' : c.house,
    };
  });
  fleets = [];
  dragStartCastle = null;
  selectedCastles = [];
  gameOver = null;
  gameStartTime = Date.now();
  if (DEBUG) console.log('Castle owners:', castles.map(c => `${c.name}: owner=${c.owner}, house=${c.house}`));
  castles.filter(c => c.owner !== 'player').forEach(c => {
    aiCooldowns[c.id] = 20 + Math.random() * 60;
  });
}

function getCastleAt(x, y) {
  const hitRadius = CASTLE_IMG_SIZE * 0.6;
  for (let i = castles.length - 1; i >= 0; i--) {
    const c = castles[i];
    if (Math.hypot(x - c.x, y - c.y) < hitRadius) return c;
  }
  return null;
}

function sendTroops(from, to) {
  const count = Math.floor(from.troops * sendRatio);
  if (count < 1 || from === to) return;
  from.troops -= count;
  fleets.push({ x: from.x, y: from.y, target: to, troops: count, owner: from.owner, house: from.house });
}

function runAI() {
  if (!debugAIEnabled) return;
  const elapsed = Date.now() - gameStartTime;
  if (elapsed < AI_GRACE_MS) return;
  const d = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
  castles.forEach(c => {
    if (c.owner === 'player') return;
    const cd = aiCooldowns[c.id] ?? 0;
    if (cd > 0) { aiCooldowns[c.id] = cd - 1; return; }
    if (c.troops < AI_MIN_TROOPS) return;

    const others = castles.filter(t => t !== c && t.owner !== c.owner);
    if (others.length === 0) return;
    let targets = others.filter(t => t.owner !== 'player');
    if (targets.length === 0 || elapsed >= AI_PLAYER_SAFETY_MS) targets = others;
    const nearest = targets.reduce((a, b) => (d(c, a) < d(c, b) ? a : b));

    const available = c.troops - AI_GARRISON;
    if (available < 5 || !nearest) return;

    const incomingThreats = fleets.filter(f => f.target === c && f.owner !== c.owner);
    const incomingTroops = incomingThreats.reduce((sum, f) => sum + f.troops, 0);
    if (incomingTroops > 0 && c.troops - incomingTroops < AI_GARRISON) return;

    let ratio = AI_SEND_RATIO;
    if (nearest.troops > available * 0.8) ratio = 0.7;
    else if (nearest.troops < available * 0.3) ratio = 0.35;

    const count = Math.min(Math.floor(c.troops * ratio), available);
    if (count >= 5) {
      if (DEBUG) console.log(`${c.name}(${c.owner}) → ${nearest.name}(${nearest.owner}) [${count} troops, keeping ${Math.floor(c.troops - count)}]`);
      c.troops -= count;
      fleets.push({ x: c.x, y: c.y, target: nearest, troops: count, owner: c.owner, house: c.house });
      aiCooldowns[c.id] = AI_COOLDOWN_MIN + Math.random() * (AI_COOLDOWN_MAX - AI_COOLDOWN_MIN);
    }
  });
}

function update() {
  if (gameOver) return;
  if (debugEditMode) return;

  castles.forEach(c => {
    c.troops += TROOP_GROWTH;
  });

  runAI();

  fleets.forEach(f => {
    const dx = f.target.x - f.x;
    const dy = f.target.y - f.y;
    const dist = Math.hypot(dx, dy);
    if (dist < FLEET_SPEED) {
      if (f.target.owner === f.owner) {
        f.target.troops += f.troops;
      } else {
        f.target.troops -= f.troops;
        if (f.target.troops < 0) {
          f.target.owner = f.owner;
          f.target.house = f.house;
          f.target.troops = Math.abs(f.target.troops);
          const angle = Math.atan2(f.target.y - f.y, f.target.x - f.x);
          const color = HOUSES[f.house]?.color || '#fff';
          for (let p = 0; p < 10; p++) {
            const spread = (Math.random() - 0.5) * 1.2;
            const speed = 1.5 + Math.random() * 2;
            impactParticles.push({
              x: f.target.x, y: f.target.y,
              vx: Math.cos(angle + spread) * speed,
              vy: Math.sin(angle + spread) * speed,
              alpha: 1, size: 2 + Math.random() * 3, color
            });
          }
        }
      }
      f.arrived = true;
    } else {
      f.x += (dx / dist) * FLEET_SPEED;
      f.y += (dy / dist) * FLEET_SPEED;
    }
  });
  fleets = fleets.filter(f => !f.arrived);

  selectedCastles = selectedCastles.filter(c => c.owner === 'player');

  const playerCastles = castles.filter(c => c.owner === 'player');
  const enemyCastles = castles.filter(c => c.owner !== 'player');
  const playerFleets = fleets.filter(f => f.owner === 'player');
  if (playerCastles.length === 0 && playerFleets.length === 0) gameOver = 'defeat';
  if (enemyCastles.length === 0) {
    gameOver = 'victory';
    sfxVictory.currentTime = 0;
    sfxVictory.play().catch(() => {});
  }
}

function draw() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W(), H());

  if (mapImage.complete && mapImage.naturalWidth) {
    ctx.drawImage(mapImage, 0, 0, W(), H());
  } else {
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.moveTo(W() * 0.10, H() * 0.04);
    ctx.lineTo(W() * 0.90, H() * 0.06);
    ctx.lineTo(W() * 0.96, H() * 0.50);
    ctx.lineTo(W() * 0.72, H() * 0.96);
    ctx.lineTo(W() * 0.24, H() * 0.94);
    ctx.lineTo(W() * 0.04, H() * 0.46);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  if (dragStartCastle && !debugEditMode) {
    const sources = selectedCastles.length ? selectedCastles : [dragStartCastle];
    sources.forEach(c => {
      const dx = dragX - c.x, dy = dragY - c.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 5) return;
      const angle = Math.atan2(dy, dx);
      if (marchLineImage.complete && marchLineImage.naturalWidth) {
        const tileH = 18;
        const tileW = marchLineImage.naturalWidth * (tileH / marchLineImage.naturalHeight);
        const count = Math.ceil(dist / tileW);
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(angle);
        for (let t = 0; t < count; t++) {
          ctx.drawImage(marchLineImage, t * tileW, -tileH / 2, tileW, tileH);
        }
        ctx.restore();
      } else {
        ctx.strokeStyle = 'rgba(201, 162, 39, 0.6)';
        ctx.lineWidth = 3;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.moveTo(c.x, c.y);
        ctx.lineTo(dragX, dragY);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      const arrLen = 12;
      ctx.fillStyle = 'rgba(201, 162, 39, 0.8)';
      ctx.beginPath();
      ctx.moveTo(dragX, dragY);
      ctx.lineTo(dragX - arrLen * Math.cos(angle - 0.4), dragY - arrLen * Math.sin(angle - 0.4));
      ctx.lineTo(dragX - arrLen * Math.cos(angle + 0.4), dragY - arrLen * Math.sin(angle + 0.4));
      ctx.closePath();
      ctx.fill();
    });
  }

  fleets.forEach(f => {
    const h = HOUSES[f.house] || HOUSES.stark;
    const src = knightImageNoBg || (knightImage.complete && knightImage.naturalWidth ? knightImage : null);
    const fleetH = 54;
    const fleetW = src ? Math.round(src.width * (fleetH / src.height)) : fleetH;
    if (src) {
      ctx.drawImage(src, 0, 0, src.width, src.height, f.x - fleetW / 2, f.y - fleetH / 2, fleetW, fleetH);
    } else {
      ctx.fillStyle = h.color;
      ctx.beginPath();
      ctx.arc(f.x, f.y, 14, 0, Math.PI * 2);
      ctx.fill();
    }
    const troopBadge = String(Math.floor(f.troops));
    ctx.font = 'bold 9px BentonSans, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.beginPath();
    ctx.arc(f.x + fleetW / 2 - 4, f.y - fleetH / 2 + 4, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillText(troopBadge, f.x + fleetW / 2 - 4, f.y - fleetH / 2 + 4);
  });

  const pulseT = Date.now() * 0.003;
  castles.forEach(c => {
    const h = HOUSES[c.house];
    const isSelected = selectedCastles.includes(c);
    const isPlayerCastle = c.owner === 'player';
    const img = castleImages[c.house];
    const half = CASTLE_IMG_SIZE / 2;
    const circleR = half + 4;

    const processed = castleImagesNoBg[c.house];
    if (processed) {
      ctx.drawImage(processed, 0, 0, processed.width, processed.height, c.x - half, c.y - half, CASTLE_IMG_SIZE, CASTLE_IMG_SIZE);
    } else if (img && img.complete && img.naturalWidth) {
      ctx.drawImage(img, c.x - half, c.y - half, CASTLE_IMG_SIZE, CASTLE_IMG_SIZE);
    }


    if (isSelected) {
      ctx.strokeStyle = '#39ff14';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(c.x, c.y, circleR - 2, 0, Math.PI * 2);
      ctx.stroke();
    }


    const troopStr = String(Math.floor(c.troops));
    ctx.font = 'bold 15px BentonSans, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.lineJoin = 'round';
    ctx.miterLimit = 2;
    ctx.strokeText(troopStr, c.x, c.y);
    ctx.fillStyle = '#fff';
    ctx.fillText(troopStr, c.x, c.y);

    ctx.font = 'bold 11px BentonSans, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.lineJoin = 'round';
    ctx.strokeText(c.name, c.x, c.y + half + 6);
    ctx.fillStyle = '#e2e8f0';
    ctx.fillText(c.name, c.x, c.y + half + 6);
  });

  impactParticles = impactParticles.filter(p => p.alpha > 0);
  impactParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.88;
    p.vy *= 0.88;
    p.alpha -= 0.045;
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  if (dragStartCastle && !debugEditMode && targetMarkerImage.complete && targetMarkerImage.naturalWidth) {
    const sources = selectedCastles.length ? selectedCastles : [dragStartCastle];
    const hoverTarget = getCastleAt(dragX, dragY);
    if (hoverTarget && !sources.includes(hoverTarget)) {
      const markerSize = (CASTLE_IMG_SIZE - 8) * 0.7;
      const markerHalf = markerSize / 2;
      ctx.drawImage(targetMarkerImage, hoverTarget.x - markerHalf, hoverTarget.y - markerHalf, markerSize, markerSize);
    }
  }

  // Ghost finger tutorial animation
  if (!gameOver && !debugEditMode) {
    const elapsed = Date.now() - gameStartTime;
    const GHOST_TOTAL = 6500;
    const playerCastle = castles.find(c => c.owner === 'player');
    const enemies = castles.filter(c => c.owner !== 'player');
    if (elapsed < GHOST_TOTAL && playerCastle && enemies.length) {
      const nearestEnemy = enemies.reduce((a, b) =>
        Math.hypot(b.x - playerCastle.x, b.y - playerCastle.y) <
        Math.hypot(a.x - playerCastle.x, a.y - playerCastle.y) ? b : a);

      const FADE_IN   = 700;
      const TAP_DOWN  = 1200;
      const TAP_UP    = 1700;
      const DRAG_END  = 4500;
      const REL_END   = 5200;
      const FADE_OUT  = 6500;

      let alpha = 1;
      if (elapsed < FADE_IN)        alpha = elapsed / FADE_IN;
      else if (elapsed > REL_END)   alpha = Math.max(0, 1 - (elapsed - REL_END) / (FADE_OUT - REL_END));

      // Finger position
      let fx, fy;
      if (elapsed <= TAP_UP) {
        fx = playerCastle.x; fy = playerCastle.y;
      } else if (elapsed <= DRAG_END) {
        const t = (elapsed - TAP_UP) / (DRAG_END - TAP_UP);
        const e = t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
        fx = playerCastle.x + (nearestEnemy.x - playerCastle.x) * e;
        fy = playerCastle.y + (nearestEnemy.y - playerCastle.y) * e;
      } else {
        fx = nearestEnemy.x; fy = nearestEnemy.y;
      }

      // Press scale (squish on tap-down, release on lift)
      const pressing = elapsed >= TAP_DOWN && elapsed < TAP_UP;
      const pressT = pressing ? (elapsed - TAP_DOWN) / (TAP_UP - TAP_DOWN) : 0;
      const fingerScale = pressing ? (1 - 0.25 * Math.sin(pressT * Math.PI)) : 1;

      // Ripple on tap-down and on release at enemy
      const showTapRipple = elapsed >= TAP_DOWN && elapsed < TAP_DOWN + 600;
      const showRelRipple = elapsed >= DRAG_END && elapsed < DRAG_END + 700;
      if (showTapRipple || showRelRipple) {
        const rt = showTapRipple ? (elapsed - TAP_DOWN) / 600 : (elapsed - DRAG_END) / 700;
        ctx.save();
        ctx.globalAlpha = (1 - rt) * alpha * 0.7;
        ctx.strokeStyle = '#39ff14';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(fx, fy, 18 + rt * 28, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      // Draw pointer image (finger points up; rotate 180° so it points down at target)
      if (pointerImage.complete && pointerImage.naturalWidth) {
        const pSize = 64;
        const pHalf = pSize / 2;
        ctx.save();
        ctx.globalAlpha = alpha;
        // Rotate 90° CW so finger points down; translate so the fingertip (top of image) sits at castle center
        ctx.translate(fx, fy);
        ctx.rotate(Math.PI);
        ctx.scale(fingerScale, fingerScale);
        ctx.shadowColor = 'rgba(0,0,0,0.6)';
        ctx.shadowBlur = 10;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 4;
        // Offset so the actual fingertip pixel lands on the troop number at castle center
        ctx.drawImage(pointerImage, -pHalf - 14, -pSize * 0.18, pSize, pSize);
        ctx.restore();
      }
    }
  }

  if (!gameOver && !debugEditMode) {
    ctx.font = 'bold 16px BentonSans, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.lineJoin = 'round';
    ctx.strokeText('Army Size:', RATIO_BTN_X, RATIO_LABEL_Y);
    ctx.fillStyle = '#c9a227';
    ctx.fillText('Army Size:', RATIO_BTN_X, RATIO_LABEL_Y);

    RATIO_OPTIONS.forEach((opt, i) => {
      const bx = RATIO_BTN_X + i * (RATIO_BTN_W + RATIO_BTN_GAP);
      const by = RATIO_BTN_Y;
      const active = sendRatio === opt.ratio;
      ctx.fillStyle = active ? 'rgba(201, 162, 39, 0.95)' : 'rgba(15, 23, 42, 0.9)';
      ctx.beginPath();
      ctx.roundRect(bx, by, RATIO_BTN_W, RATIO_BTN_H, 6);
      ctx.fill();
      ctx.strokeStyle = active ? '#c9a227' : 'rgba(201, 162, 39, 0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(bx, by, RATIO_BTN_W, RATIO_BTN_H, 6);
      ctx.stroke();
      ctx.fillStyle = active ? '#1a1a2e' : '#c9a227';
      ctx.font = 'bold 14px BentonSans, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(opt.label, bx + RATIO_BTN_W / 2, by + RATIO_BTN_H / 2);
    });

    const elapsed = Date.now() - gameStartTime;
    if (elapsed < INSTRUCTION_FADE_MS) {
      const alpha = elapsed < INSTRUCTION_FADE_MS - 2000 ? 0.95 : (INSTRUCTION_FADE_MS - elapsed) / 2000 * 0.95;
      ctx.fillStyle = `rgba(0, 0, 0, ${alpha * 0.6})`;
      const instrLines = [
        { text: 'The realm is in rebellion!', gap: 14 },
        { text: '' },
        { text: 'Click & drag your troops from Kings Landing' },
        { text: 'to defeat the rebels. Double tap your castle' },
        { text: 'to select all.' },
      ];
      const instrY = H() / 2;
      const lineH = 18;
      const totalH = instrLines.length * lineH + 24;
      ctx.fillRect(0, instrY - totalH / 2, W(), totalH);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = 4;
      ctx.lineJoin = 'round';
      instrLines.forEach((entry, i) => {
        if (!entry.text) return;
        const ly = instrY - (instrLines.length / 2 - i - 0.5) * lineH;
        ctx.font = i === 0 ? 'bold 14px BentonSans, sans-serif' : 'bold 12px BentonSans, sans-serif';
        ctx.strokeStyle = `rgba(0, 0, 0, ${alpha})`;
        ctx.strokeText(entry.text, W() / 2, ly);
        ctx.fillStyle = i === 0 ? `rgba(255, 220, 80, ${alpha})` : `rgba(255, 255, 255, ${alpha})`;
        ctx.fillText(entry.text, W() / 2, ly);
      });
    }

    const ctaX = W() - CTA_BTN_W - CTA_BTN_MARGIN;
    const ctaY = CTA_BTN_MARGIN;
    ctx.fillStyle = 'rgba(201, 162, 39, 0.95)';
    ctx.beginPath();
    ctx.roundRect(ctaX, ctaY, CTA_BTN_W, CTA_BTN_H, 6);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.font = 'bold 12px BentonSans, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Download', ctaX + CTA_BTN_W / 2, ctaY + CTA_BTN_H / 2);
  }

  if (DEBUG && debugOverlay) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, 140, 22 + castles.length * 14);
    ctx.fillStyle = '#c9a227';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('Castle | Troops | Owner', 6, 14);
    castles.forEach((c, i) => {
      ctx.fillStyle = c.owner === 'player' ? '#39ff14' : '#94a3b8';
      ctx.fillText(`${c.name || c.id} | ${Math.floor(c.troops)} | ${c.owner}`, 6, 28 + i * 14);
    });
    ctx.textAlign = 'center';
  }

  if (gameOver) {
    if (splashImage.complete && splashImage.naturalWidth) {
      const imgAspect = splashImage.naturalWidth / splashImage.naturalHeight;
      const canvasAspect = W() / H();
      let sx = 0, sy = 0, sw = splashImage.naturalWidth, sh = splashImage.naturalHeight;
      if (imgAspect > canvasAspect) {
        sw = sh * canvasAspect;
        sx = (splashImage.naturalWidth - sw) / 2;
      } else {
        sh = sw / canvasAspect;
        sy = (splashImage.naturalHeight - sh) / 2;
      }
      ctx.drawImage(splashImage, sx, sy, sw, sh, 0, 0, W(), H());
    }
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W(), H());

    const cx = W() / 2, cy = H() / 2;
    const panelW = W() * 0.72, panelH = 230;
    const panelX = cx - panelW / 2, panelY = H() - panelH - H() * 0.14;
    const borderPulse = 0.6 + 0.4 * Math.sin(Date.now() * 0.003);

    // Title area: fire splash behind logo, centered above panel
    const titleW = W() * 0.88;
    const titleCenterY = panelY * 0.48;
    if (titleFireImage.complete && titleFireImage.naturalWidth) {
      const fireAspect = titleFireImage.naturalWidth / titleFireImage.naturalHeight;
      const fireW = titleW;
      const fireH = fireW / fireAspect;
      ctx.drawImage(titleFireImage, cx - fireW / 2, titleCenterY - fireH / 2, fireW, fireH);
    }
    if (titleLogoImage.complete && titleLogoImage.naturalWidth) {
      const logoAspect = titleLogoImage.naturalWidth / titleLogoImage.naturalHeight;
      const logoW = titleW * 0.82;
      const logoH = logoW / logoAspect;
      ctx.drawImage(titleLogoImage, cx - logoW / 2, titleCenterY - logoH / 2, logoW, logoH);
    }

    ctx.strokeStyle = gameOver === 'victory'
      ? `rgba(201, 162, 39, ${borderPulse})`
      : `rgba(192, 57, 43, ${borderPulse})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(panelX, panelY, panelW, panelH, 12);
    ctx.stroke();

    ctx.fillStyle = 'rgba(15, 23, 42, 0.78)';
    ctx.beginPath();
    ctx.roundRect(panelX, panelY, panelW, panelH, 12);
    ctx.fill();

    ctx.textAlign = 'center';

    if (gameOver === 'victory') {
      ctx.fillStyle = '#c9a227';
      ctx.font = 'bold 26px GoudyTrajan, Georgia';
      ctx.fillText('Conquest Complete!', cx, panelY + 45);
      ctx.fillStyle = '#cbd5e1';
      ctx.font = '14px BentonSans, sans-serif';
      ctx.fillText('You have conquered Westeros.', cx, panelY + 75);
    } else {
      ctx.fillStyle = '#c0392b';
      ctx.font = 'bold 26px GoudyTrajan, Georgia';
      ctx.fillText('Failed', cx, panelY + 45);
      ctx.fillStyle = '#cbd5e1';
      ctx.font = '14px BentonSans, sans-serif';
      ctx.fillText('Your forces have been vanquished.', cx, panelY + 75);
    }

    const btnW = panelW * 0.7, btnH = 44;
    const btnX = cx - btnW / 2;
    const ctaBtnY = panelY + 100;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.fillStyle = '#c9a227';
    ctx.beginPath();
    ctx.roundRect(btnX, ctaBtnY, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.font = 'bold 18px BentonSans, sans-serif';
    ctx.fillText('Download Now', cx, ctaBtnY + btnH / 2);

    if (gameOver === 'defeat') {
      const retryY = ctaBtnY + btnH + 14;
      ctx.strokeStyle = '#cbd5e1';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(btnX, retryY, btnW, btnH, 8);
      ctx.stroke();
      ctx.fillStyle = '#cbd5e1';
      ctx.font = 'bold 16px BentonSans, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Try Again', cx, retryY + btnH / 2);
    }
  }
}

function gameLoop() {
  castles.forEach(c => {
    c.x = W() * (c.px ?? c.x / W());
    c.y = H() * (c.py ?? c.y / H());
  });
  debugSpeedAccum += debugSpeed;
  while (debugSpeedAccum >= 1) { update(); debugSpeedAccum -= 1; }
  draw();
  requestAnimationFrame(gameLoop);
}

function toCanvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY,
  };
}

function handleCTA() {
  const STORE_URL = 'https://example.com/download';
  if (typeof FbPlayableAd !== 'undefined' && FbPlayableAd.onCTAClick) {
    FbPlayableAd.onCTAClick();
  } else {
    window.open(STORE_URL, '_blank');
  }
}

function handlePointerDown(clientX, clientY) {
  if (gameOver) {
    const { x, y } = toCanvasCoords(clientX, clientY);
    const cx = W() / 2, cy = H() / 2;
    const panelW = W() * 0.72, panelH = 230;
    const panelY = H() - panelH - H() * 0.14;
    const btnW = panelW * 0.7, btnH = 44;
    const btnX = cx - btnW / 2;
    const ctaBtnY = panelY + 100;
    if (x >= btnX && x <= btnX + btnW && y >= ctaBtnY && y <= ctaBtnY + btnH) {
      handleCTA();
      return;
    }
    if (gameOver === 'defeat') {
      const retryY = ctaBtnY + btnH + 14;
      if (x >= btnX && x <= btnX + btnW && y >= retryY && y <= retryY + btnH) {
        initCastles();
        bgMusic.currentTime = 0;
        bgMusic.play().catch(() => {});
        return;
      }
    }
    return;
  }

  const { x, y } = toCanvasCoords(clientX, clientY);

  const ctaX = W() - CTA_BTN_W - CTA_BTN_MARGIN;
  const ctaY = CTA_BTN_MARGIN;
  if (x >= ctaX && x <= ctaX + CTA_BTN_W && y >= ctaY && y <= ctaY + CTA_BTN_H) {
    handleCTA();
    return;
  }

  for (let i = 0; i < RATIO_OPTIONS.length; i++) {
    const bx = RATIO_BTN_X + i * (RATIO_BTN_W + RATIO_BTN_GAP);
    if (x >= bx && x <= bx + RATIO_BTN_W && y >= RATIO_BTN_Y && y <= RATIO_BTN_Y + RATIO_BTN_H) {
      sendRatio = RATIO_OPTIONS[i].ratio;
      return;
    }
  }

  pointerDownX = x;
  pointerDownY = y;
  const castle = getCastleAt(x, y);

  if (debugEditMode && castle) {
    dragStartCastle = castle;
    dragOffsetX = x - castle.x;
    dragOffsetY = y - castle.y;
    dragX = x;
    dragY = y;
    return;
  }

  if (castle && castle.owner === 'player') {
    dragStartCastle = castle;
    dragX = x;
    dragY = y;
  }
}

function handlePointerMove(clientX, clientY) {
  if (!dragStartCastle) return;
  const { x, y } = toCanvasCoords(clientX, clientY);
  dragX = x;
  dragY = y;
  if (debugEditMode) {
    const c = dragStartCastle;
    c.x = x - dragOffsetX;
    c.y = y - dragOffsetY;
    c.px = c.x / W();
    c.py = c.y / H();
  }
}

function handlePointerUp(clientX, clientY) {
  if (!dragStartCastle) return;

  if (debugEditMode) {
    const c = dragStartCastle;
    c.px = c.x / W();
    c.py = c.y / H();
    const positions = {};
    castles.forEach(cs => { positions[cs.id] = { px: cs.px, py: cs.py }; });
    localStorage.setItem(POSITIONS_KEY, JSON.stringify(positions));
    dragStartCastle = null;
    return;
  }

  const { x, y } = toCanvasCoords(clientX, clientY);
  const moved = Math.hypot(x - pointerDownX, y - pointerDownY) > 15;
  const castle = getCastleAt(x, y);

  if (moved && castle) {
    const sources = selectedCastles.length ? selectedCastles : (dragStartCastle ? [dragStartCastle] : []);
    sources.forEach(from => {
      if (from !== castle) sendTroops(from, castle);
    });
    if (sources.length) { selectedCastles = []; selectAllMode = false; }
  } else if (!moved) {
    if (dragStartCastle && dragStartCastle.owner === 'player') {
      const now = Date.now();
      if (lastTapCastle === dragStartCastle && now - lastTapTime < 350) {
        selectedCastles = castles.filter(c => c.owner === 'player');
        selectAllMode = true;
        lastTapCastle = null;
        lastTapTime = 0;
      } else {
        selectAllMode = false;
        const i = selectedCastles.indexOf(dragStartCastle);
        if (i >= 0) selectedCastles.splice(i, 1);
        else selectedCastles.push(dragStartCastle);
        lastTapCastle = dragStartCastle;
        lastTapTime = now;
      }
    } else {
      // Tapped empty space or a non-player castle — clear all selections
      selectedCastles = [];
      selectAllMode = false;
      lastTapCastle = null;
      lastTapTime = 0;
    }
  }

  dragStartCastle = null;
}

canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  tryStartMusic();
  handlePointerDown(e.clientX, e.clientY);
  if (dragStartCastle) e.target.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', (e) => {
  handlePointerMove(e.clientX, e.clientY);
});
canvas.addEventListener('pointerup', (e) => {
  e.preventDefault();
  handlePointerUp(e.clientX, e.clientY);
});
canvas.addEventListener('pointercancel', () => {
  dragStartCastle = null;
});


if (DEBUG) document.getElementById('debug-btn').style.display = 'block';
document.getElementById('debug-btn').addEventListener('click', () => {
  document.getElementById('debug-panel').classList.toggle('open');
});
document.getElementById('dbg-edit').addEventListener('change', (e) => {
  debugEditMode = e.target.checked;
  if (!debugEditMode) dragStartCastle = null;
});
document.getElementById('dbg-ai').addEventListener('change', (e) => { debugAIEnabled = e.target.checked; });
document.getElementById('dbg-speed').addEventListener('input', (e) => { debugSpeed = parseFloat(e.target.value); });
document.getElementById('dbg-overlay').addEventListener('change', (e) => { debugOverlay = e.target.checked; });
document.getElementById('dbg-reset').addEventListener('click', () => {
  initCastles();
  document.getElementById('debug-panel').classList.remove('open');
});
document.getElementById('dbg-clear-pos').addEventListener('click', () => {
  localStorage.removeItem(POSITIONS_KEY);
  initCastles();
  document.getElementById('debug-panel').classList.remove('open');
});

document.getElementById('dbg-export').addEventListener('click', () => {
  const out = document.getElementById('dbg-export-output');
  const positions = {};
  castles.forEach(cs => { positions[cs.id] = { px: parseFloat(cs.px.toFixed(4)), py: parseFloat(cs.py.toFixed(4)) }; });
  out.textContent = JSON.stringify(positions, null, 2);
  out.style.display = 'block';
});

function tintImage(sourceCanvas, color, opacity) {
  const c = document.createElement('canvas');
  c.width = sourceCanvas.width;
  c.height = sourceCanvas.height;
  const tctx = c.getContext('2d');
  tctx.drawImage(sourceCanvas, 0, 0);
  tctx.globalCompositeOperation = 'source-atop';
  tctx.fillStyle = color;
  tctx.globalAlpha = opacity;
  tctx.fillRect(0, 0, c.width, c.height);
  tctx.globalAlpha = 1;
  tctx.globalCompositeOperation = 'source-over';
  return c;
}

let assetsLoaded = false;
let assetsTotal = 0;
let assetsReady = 0;

function trackAsset(img, onDone) {
  assetsTotal++;
  const orig = img.onload;
  img.onload = () => {
    if (orig) orig();
    if (onDone) onDone();
    assetsReady++;
    if (assetsReady >= assetsTotal) {
      assetsLoaded = true;
      initCastles();
      gameLoop();
    }
  };
  img.onerror = () => {
    assetsReady++;
    if (assetsReady >= assetsTotal) {
      assetsLoaded = true;
      initCastles();
      gameLoop();
    }
  };
}

function drawLoadingScreen() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W(), H());

  ctx.fillStyle = '#c9a227';
  ctx.font = 'bold 26px GoudyTrajan, Georgia';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Conquest of Westeros', W() / 2, H() / 2 - 40);

  ctx.fillStyle = '#94a3b8';
  ctx.font = '14px BentonSans, sans-serif';
  ctx.fillText('Loading...', W() / 2, H() / 2 + 10);

  const barW = W() * 0.5;
  const barH = 6;
  const barX = (W() - barW) / 2;
  const barY = H() / 2 + 35;
  ctx.fillStyle = '#1e293b';
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW, barH, 3);
  ctx.fill();

  const progress = assetsTotal > 0 ? assetsReady / assetsTotal : 0;
  if (progress > 0) {
    ctx.fillStyle = '#c9a227';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW * progress, barH, 3);
    ctx.fill();
  }

  if (!assetsLoaded) requestAnimationFrame(drawLoadingScreen);
}

function loadCastleImages() {
  CASTLE_ASSETS.forEach(house => {
    const img = new Image();
    const processImg = () => {
      try {
        const size = img.naturalWidth;
        const c = document.createElement('canvas');
        c.width = size; c.height = size;
        const cctx = c.getContext('2d');
        cctx.save();
        cctx.beginPath();
        cctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
        cctx.clip();
        cctx.drawImage(img, 0, 0);
        cctx.globalCompositeOperation = 'source-atop';
        cctx.fillStyle = HOUSES[house].color;
        cctx.globalAlpha = 0.55;
        cctx.fillRect(0, 0, size, size);
        cctx.restore();
        castleImagesNoBg[house] = c;
      } catch (_) {}
    };
    trackAsset(img, processImg);
    img.src = `assets/${house}.png`;
    castleImages[house] = img;
  });
}

trackAsset(mapImage);
mapImage.src = 'assets/map.png';
trackAsset(knightImage);
knightImage.src = 'assets/fleet-icon.png';
trackAsset(selectionMarkerImage);
selectionMarkerImage.src = 'assets/selection-marker.png';
trackAsset(targetMarkerImage);
targetMarkerImage.src = 'assets/target-marker.png';
trackAsset(splashImage);
splashImage.src = 'assets/splash.png';
trackAsset(marchLineImage);
marchLineImage.src = 'assets/march-line.png';
trackAsset(titleFireImage);
titleFireImage.src = 'assets/title-fire.png';
trackAsset(titleLogoImage);
titleLogoImage.src = 'assets/title-logo.png';
trackAsset(pointerImage);
pointerImage.src = 'assets/pointer.png';
loadCastleImages();
drawLoadingScreen();
</script>
